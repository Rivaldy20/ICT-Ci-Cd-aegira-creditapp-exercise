name: Deploy ke Laptop (Self-Hosted Container Runner)

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-laptop
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: docker-local

    steps:
      - name: ⬇️ Checkout kode
        uses: actions/checkout@v4

      # Login ke Docker Hub (gunakan secrets DOCKER_USERNAME & DOCKER_TOKEN)
      - name: 🔐 Login ke Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Build image backend dari direktori ./aegira-loan-service
      - name: 🏗️ Build image backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/docker-image-backend:latest ./aegira-loan-service

      # Build image frontend dari direktori ./creditappdemo
      - name: 🏗️ Build image frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/docker-image-frontend:latest ./creditappdemo

      # Push image ke Docker Hub
      - name: 📤 Push image backend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-image-backend:latest

      - name: 📤 Push image frontend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-image-frontend:latest

      # Tarik image terbaru dan jalankan container
      - name: 🔄 Pull image terbaru & deploy
        run: |
          docker compose pull
          docker compose up -d --remove-orphans
        env:
          # Variabel lingkungan yang dibutuhkan oleh container (diambil dari secrets)
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          LOAN_DATA_SOURCE_MODE: ${{ secrets.LOAN_DATA_SOURCE_MODE }}
          IDEMPOTENCY_ENABLED: ${{ secrets.IDEMPOTENCY_ENABLED }}

      # Bersihkan image lama yang tidak terpakai
      - name: 🧹 Hapus image lama
        run: docker image prune -f
