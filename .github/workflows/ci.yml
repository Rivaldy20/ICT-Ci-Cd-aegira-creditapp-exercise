name: Build, Test, Push, and Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  BACKEND_IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/aegira-loan-service
  FRONTEND_IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/creditappdemo

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: aegira-loan-service/pom.xml

      - name: Build Backend
        working-directory: aegira-loan-service
        run: mvn -B clean package -DskipTests

  test-backend:
    name: Test Backend
    needs: build-backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: aegira-loan-service/pom.xml

      - name: Run Backend Tests
        working-directory: aegira-loan-service
        run: mvn -B test

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: creditappdemo/package-lock.json

      - name: Install Dependencies
        working-directory: creditappdemo
        run: npm ci

      - name: Build Frontend
        working-directory: creditappdemo
        run: npm run build

  test-frontend:
    name: Test Frontend
    needs: build-frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docker/creditappdemo/package-lock.json

      - name: Install Dependencies
        working-directory: docker/creditappdemo
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: docker/creditappdemo
        run: npx playwright install --with-deps chromium

      - name: Run Frontend Tests
        working-directory: docker/creditappdemo
        run: npm run test:e2e

  push-backend:
    name: Push Backend Image
    needs: test-backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Buildx
        uses: setup-buildx-action@v3

      - name: Build and Push Backend
        uses: build-push-action@v6
        with:
          context: aegira-loan-service
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE_REPO }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE_REPO }}:latest

  push-frontend:
    name: Push Frontend Image
    needs: test-frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Buildx
        uses: setup-buildx-action@v3

      - name: Build and Push Frontend
        uses: build-push-action@v6
        with:
          context: creditappdemo
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE_REPO }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE_REPO }}:latest

  deploy:
    name: Deploy
    needs:
      - push-backend
      - push-frontend

    runs-on: [self-hosted, docker-cicd]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull Latest Images
        run: |
          docker compose -f docker-compose.prod.yml pull

      - name: Deploy Containers
        run: |
          docker compose -f docker-compose.prod.yml up -d

      - name: Show Running Containers
        run: |
          docker compose -f docker-compose.prod.yml ps

      - name: Show Logs If Failed
        if: failure()
        run: |
          docker compose -f docker-compose.prod.yml logs
