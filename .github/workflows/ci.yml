name: Deploy ke Laptop (Self-Hosted Container Runner)
 
on:
  push:
    branches:
      - main
 
concurrency:
  group: deploy-laptop
  cancel-in-progress: true
 
jobs:
  # Job untuk build dan push image secara paralel
  build-and-push:
    runs-on: docker-local
    strategy:
      matrix:
        service: [backend, frontend]
        include:
          - service: backend
            context: ./aegira-loan-service
            image_name: docker-image-backend
          - service: frontend
            context: ./creditappdemo
            image_name: docker-image-frontend
    steps:
      - name: ⬇️ Checkout kode
        uses: actions/checkout@v4
 
      - name: 🔐 Login ke Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
 
      - name: 🏗️ Build image ${{ matrix.service }}
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image_name }}:latest ${{ matrix.context }}
 
      - name: 📤 Push image ${{ matrix.service }}
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image_name }}:latest
 
  # Job deploy yang berjalan setelah semua build dan push selesai
  deploy:
    runs-on: docker-local
    needs: build-and-push
    steps:
      - name: ⬇️ Checkout kode (untuk docker-compose.yml)
        uses: actions/checkout@v4
 
      - name: 🔐 Login ke Docker Hub (agar pull berhasil)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
 
      - name: 🔄 Pull image terbaru & deploy
        run: |
          docker compose pull
          docker compose up -d --remove-orphans
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          LOAN_DATA_SOURCE_MODE: ${{ secrets.LOAN_DATA_SOURCE_MODE }}
          IDEMPOTENCY_ENABLED: ${{ secrets.IDEMPOTENCY_ENABLED }}
 
      - name: 🧹 Hapus image lama
        run: docker image prune -f
 