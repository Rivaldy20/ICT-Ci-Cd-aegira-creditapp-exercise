name: Build, Test, Push, and Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  BACKEND_IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/aegira-loan-service
  FRONTEND_IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/creditappdemo

jobs:
  # 1. Jalankan unit test backend (Java/Maven) - tidak butuh DB/Redis nyala,
  #    semua test di project ini murni unit test (Mockito).
  test-backend:
    name: Test Backend (aegira-loan-service)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: aegira-loan-service/pom.xml

      - name: Run backend unit tests
        working-directory: aegira-loan-service
        run: mvn -B test

  # 2. Jalankan test frontend (Playwright). playwright.config.js sudah
  #    otomatis start vite dev server sendiri (mode mock), jadi tidak
  #    butuh backend nyala.
  test-frontend:
    name: Test Frontend (creditappdemo)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: creditappdemo/package-lock.json

      - name: Install dependencies
        working-directory: creditappdemo
        run: npm ci

      - name: Install Playwright browsers
        working-directory: creditappdemo
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: creditappdemo
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: creditappdemo/playwright-report/
          retention-days: 7

  # 3. Build image backend & push ke Docker Hub (private repo).
  #    Hanya jalan kalau test-backend sukses.
  build-and-push-backend:
    name: Build & Push Backend Image
    needs: test-backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./aegira-loan-service
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE_REPO }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE_REPO }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # 4. Build image frontend & push ke Docker Hub (private repo).
  #    Hanya jalan kalau test-frontend sukses.
  build-and-push-frontend:
    name: Build & Push Frontend Image
    needs: test-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./creditappdemo
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE_REPO }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE_REPO }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # 5. Deploy: tarik image yang baru saja di-push, jalankan di server
  #    lewat self-hosted runner (docker-cicd), pakai docker-compose.prod.yml.
  deploy:
    name: Deploy with Self-Hosted Runner
    needs: [build-and-push-backend, build-and-push-frontend]
    runs-on: [self-hosted, docker-cicd]

    permissions:
      contents: read

    env:
      BACKEND_IMAGE: ${{ env.BACKEND_IMAGE_REPO }}:${{ github.sha }}
      FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE_REPO }}:${{ github.sha }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify Docker
        run: |
          docker --version
          docker compose version

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull latest images
        run: docker compose -f docker-compose.prod.yml pull

      - name: Deploy (recreate containers)
        run: docker compose -f docker-compose.prod.yml up -d

      - name: Show running containers
        run: |
          docker compose -f docker-compose.prod.yml ps

      - name: Show logs if deployment fails
        if: failure()
        run: |
          docker compose -f docker-compose.prod.yml logs
